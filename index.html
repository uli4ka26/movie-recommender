<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Co obejrzeć dziś?</title>

<style>
body{
font-family: Arial;
background: linear-gradient(135deg, #0f172a, #1e293b);
color:white;
text-align:center;
padding:30px;
}

h1{
color:#ffcc00;
}

select, button{
padding:10px;
margin:10px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
background:#ffcc00;
cursor:pointer;
}

#result{
margin-top:30px;
font-size:20px;
}
  .card{
background: rgba(255,255,255,0.05);
padding:20px;
border-radius:20px;
max-width:500px;
margin:auto;
box-shadow: 0 10px 30px rgba(0,0,0,0.4);
backdrop-filter: blur(10px);
}
</style>

</head>

<body>
<div class="card">
<h1>🎬 Co obejrzeć dziś?</h1>

<p>Jak się dziś czujesz?</p>
<select id="mood">
<option>Radośnie</option>
<option>Spokojnie</option>
<option>Chcę akcji</option>
<option>Chcę się zastanowić</option>
</select>

<p>Ile masz czasu?</p>
<select id="time">
<option>Do 2 godzin</option>
<option>Ponad 2 godziny</option>
</select>

<p>Jaki gatunek filmu?</p>
<select id="genre">
<option>Komedia</option>
<option>Akcja</option>
<option>Science fiction</option>
<option>Dramat</option>
</select>

<br>

<button onclick="pickMovie()">Zaproponuj film</button>

<div id="result"></div>
<img id="poster" style="margin-top:15px; width:200px; border-radius:10px;">

<script>
function pickMovie(){

let genre = document.getElementById("genre").value;

let result = "";
let poster = "";

if(genre === "Komedia"){
result = "🎭 'Jeden plus jeden' – zabawny film o przyjaźni.";
poster = "https://upload.wikimedia.org/wikipedia/en/6/67/Intouchables_french_poster.png";

if(genre === "Akcja"){
result = "💥 'John Wick' – dynamiczny film akcji.";
poster = "https://upload.wikimedia.org/wikipedia/en/9/98/John_Wick_TeaserPoster.jpg";
}

if(genre === "Science fiction"){
result = "🚀 'Interstellar' – podróż przez kosmos i czas.";
poster = "https://upload.wikimedia.org/wikipedia/en/b/bc/Interstellar_film_poster.jpg";
}

if(genre === "Dramat"){
result = "🎬 'Green Book' – poruszająca historia.";
poster = "https://upload.wikimedia.org/wikipedia/en/8/8d/Green_Book_film_poster.png";

document.getElementById("result").innerHTML = result;
document.getElementById("poster").src = poster;

}
</script>
</div>
</body>
</html>
